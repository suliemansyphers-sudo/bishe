# Web服务器端口
server.port=8080

# 数据库连接配置 (注意：如果你的数据库名字不是 liquor_sys，请修改下面的 URL)
spring.datasource.url=jdbc:mysql://localhost:3306/liquor_sys?serverTimezone=GMT%2B8&characterEncoding=utf-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root

# 🚨 警告：请务必把下面这行的 123456 改成你电脑上真实的 MySQL 密码！！！
spring.datasource.password=123456

# MyBatis-Plus 配置（打印 SQL 语句，方便我们后续看程序是怎么查数据库的）
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.map-underscore-to-camel-case=true